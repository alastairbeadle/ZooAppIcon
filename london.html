<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">

  <link rel="apple-touch-icon" href="ZooAppIcon.png">
  <link rel="icon" href="ZooAppIcon.png" type="image/png">
  <link rel="manifest" href="manifest.json">

  <title>London Animals</title>

  <style>
    html, body, iframe {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

  <script>
    const deployment = "london";
    const title = document.title;
    const manifest = {
      name: title,
      short_name: title,
      start_url: window.location.pathname,
      display: "standalone",
      background_color: "#ffffff",
      theme_color: "#ffffff",
      icons: [
        { src: "ZooAppIcon.png", sizes: "192x192", type: "image/png" },
        { src: "ZooAppIcon.png", sizes: "512x512", type: "image/png" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    document.querySelector('link[rel="manifest"]').setAttribute('href', url);

    fetch("deployments.json")
      .then(r => r.json())
      .then(map => {
        const url = map[deployment];
        document.getElementById("app").src = url;
      });
  </script>
</head>

<body>
  <iframe id="app"></iframe>
</body>
</html>

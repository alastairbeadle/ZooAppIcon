<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">

  <link rel="apple-touch-icon" href="ZooAppIcon.png">
  <link rel="icon" href="ZooAppIcon.png" type="image/png">

  <style>
    html, body, iframe {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

  <script>
    // Extract filename → "whipsnade.html"
    const filename = window.location.pathname.split("/").pop();

    // Remove .html → "whipsnade"
    const deployment = filename.replace(".html", "");

    // Build title according to your rules
    let title;

    if (deployment.startsWith("dev-")) {
      // dev-whipsnade → Dev(Whipsnade)
      const rest = deployment.substring(4); // remove "dev-"
      title = "Dev (" + rest.charAt(0).toUpperCase() + rest.slice(1) + ")";
    } else {
      // whipsnade → Whipsnade
      title = deployment.charAt(0).toUpperCase() + deployment.slice(1);
    }

    // Apply title
    document.title = title;

    // Load deployments map
    fetch("deployments.json")
      .then(r => r.json())
      .then(map => {
        const url = map[deployment];
        document.getElementById("app").src = url;
      });
  </script>
</head>

<body>
  <iframe id="app"></iframe>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">

  <link rel="apple-touch-icon" href="ZooAppIcon.png">
  <link rel="icon" href="ZooAppIcon.png" type="image/png">
  <link rel="manifest" href="manifest.json">

  <title>Dev (Photo)</title>

  <style>
    html, body, iframe {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

  <script>
    // Calculate deployment name from filename
    const deployment = window.location.pathname.split("/").pop().replace(".html", "");

    // Load the deployments map
    fetch("deployments.json")
      .then(r => r.json())
      .then(map => {
        const url = map[deployment];
        document.getElementById("app").src = url;
      });
  </script>
</head>

<body>
  <iframe id="app"></iframe>
</body>
</html>
